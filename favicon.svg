<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#001428"/>
      <stop offset="100%" stop-color="#000508"/>
    </radialGradient>
    <radialGradient id="orbGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ddf4ff"/>
      <stop offset="35%" stop-color="#55bbff"/>
      <stop offset="80%" stop-color="#1166cc"/>
      <stop offset="100%" stop-color="#002266"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#44aaff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#44aaff" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Glow halo -->
  <circle cx="50" cy="40" r="26" fill="url(#glowGrad)" filter="url(#gf)"/>

  <!-- Orb ring -->
  <circle cx="50" cy="40" r="18" fill="none" stroke="rgba(100,200,255,0.35)" stroke-width="1"/>

  <!-- Main orb -->
  <circle cx="50" cy="40" r="17" fill="url(#orbGrad)"/>

  <!-- Orb highlight -->
  <circle cx="44" cy="34" r="7"   fill="rgba(220,245,255,0.28)"/>
  <circle cx="42" cy="33" r="3"   fill="rgba(255,255,255,0.50)"/>

  <!-- Stars -->
  <circle cx="20" cy="19" r="1"   fill="rgba(255,255,255,0.85)"/>
  <circle cx="76" cy="13" r="0.9" fill="rgba(255,255,255,0.65)"/>
  <circle cx="86" cy="33" r="0.8" fill="rgba(255,255,255,0.75)"/>
  <circle cx="14" cy="53" r="0.9" fill="rgba(255,255,255,0.55)"/>
  <circle cx="83" cy="57" r="0.8" fill="rgba(255,255,255,0.65)"/>
  <circle cx="64" cy="10" r="0.8" fill="rgba(255,255,255,0.55)"/>
  <circle cx="32" cy="60" r="0.7" fill="rgba(255,255,255,0.40)"/>

  <!-- Water wave lines -->
  <path d="M4 66 Q22 61 40 66 Q58 71 76 66 Q88 63 97 66"
        fill="none" stroke="rgba(68,170,255,0.28)" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M8 76 Q28 71 48 76 Q68 81 88 76"
        fill="none" stroke="rgba(68,170,255,0.16)" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Orb reflection on water -->
  <ellipse cx="50" cy="72" rx="9" ry="2.5" fill="rgba(68,170,255,0.14)"/>
</svg>
